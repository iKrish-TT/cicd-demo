name: CI/CD Pipeline

# Triggers: runs on every push and pull request to main/dev branches
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Test (runs on every push/PR)
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]  # Test against multiple Node versions

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"             # Cache node_modules for faster runs

      - name: 📦 Install dependencies
        run: npm ci                # Clean install (faster & reproducible)

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🧪 Run tests with coverage
        run: npm test

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Build (only after tests pass)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test                    # Won't run if tests fail

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build

      - name: ✅ Build success
        run: echo "Build passed on commit ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # JOB 3: Deploy (only on push to main, not PRs)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (main only)
    runs-on: ubuntu-latest
    needs: build                   # Depends on build passing
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Simulate Deploy
        run: |
          echo "Deploying commit ${{ github.sha }} to production..."
          echo "Deployed by: ${{ github.actor }}"
          echo "✅ Deployment complete!"
        # 👆 Replace this step with your real deploy command, e.g.:
        # - Deploy to Railway:  railway up
        # - Deploy to Render:   curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        # - Deploy to Fly.io:   flyctl deploy
        # - Deploy to Vercel:   vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
